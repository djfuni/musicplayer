<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欲宝Remix - 灵动音源库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-index">
    <header class="sticky top-0 z-50 liquid-glass border-b-0 rounded-b-3xl mb-8">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-blue-500 to-purple-500 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.5)]">
                    <i class="fa fa-music text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-purple-200">欲宝Remix</span>
            </div>
            <a href="admin.html" class="text-sm text-gray-400 hover:text-white transition-colors"><i class="fa fa-user-circle-o mr-1"></i> 控制台入口</a>
        </div>
    </header>

    <main class="container mx-auto px-4 flex-1">
        <div class="flex justify-between items-end mb-8 px-2">
            <h2 class="text-3xl font-bold text-white drop-shadow-lg">发现音源</h2>
            <span id="musicCount" class="text-blue-200 text-sm bg-blue-900/30 px-3 py-1 rounded-full border border-blue-500/30">读取中...</span>
        </div>
        
        <div id="clientMusicList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-10">
            <div class="col-span-full flex flex-col items-center justify-center py-20 text-blue-300/60">
                <i class="fa fa-circle-o-notch fa-spin text-4xl mb-4"></i>
                <p class="tracking-widest">正在连接音源库...</p>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
